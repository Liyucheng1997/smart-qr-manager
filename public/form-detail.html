<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>表单二维码 — Smart QR Manager</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="nav" id="nav"></header>

  <div class="container">
    <a href="/forms.html" class="muted" style="font-size:14px">← 返回表单列表</a>
    <div class="msg" id="msg" style="margin-top:14px"></div>

    <div class="grid grid-2" id="content" style="margin-top:14px; align-items:start; display:none">
      <div class="card qr-preview">
        <canvas id="qrCanvas" width="512" height="512" style="width:240px; height:240px"></canvas>
        <a class="btn" id="download" download="form-qr.png">下载二维码 PNG</a>

        <div style="width:100%; border-top:1px solid var(--line); margin-top:8px; padding-top:14px">
          <label style="margin-top:0">中心 Logo（可选）</label>
          <p class="muted" style="font-size:12px; margin:0 0 10px">
            上传一张图片叠加到二维码中心。已启用高纠错，正常仍可扫描。
          </p>
          <div class="row" style="gap:10px">
            <input type="file" id="logoFile" accept="image/*" style="font-size:13px" />
            <button class="btn ghost sm" id="removeLogo" style="display:none">移除</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h1 class="page-title" id="title" style="margin-bottom:6px"></h1>
        <p class="muted" id="desc" style="margin-top:0"></p>

        <label>表单链接（二维码内容）</label>
        <div class="row" style="gap:8px">
          <input id="formUrl" readonly />
          <button class="btn ghost sm" id="copyBtn">复制</button>
        </div>
        <a id="openForm" target="_blank" class="muted" style="font-size:13px; display:inline-block; margin-top:8px">在新标签预览填写页 →</a>

        <div class="grid grid-2" style="margin-top:22px">
          <div>
            <div class="stat-num" id="subCount">0</div>
            <div class="stat-label">已收集份数</div>
          </div>
          <div>
            <div class="stat-num" id="fieldCount" style="font-size:18px; font-weight:700"></div>
            <div class="stat-label">字段数</div>
          </div>
        </div>

        <div class="row" style="gap:10px; margin-top:24px">
          <a class="btn" id="subLink">查看收集结果</a>
          <a class="btn ghost" id="editLink">编辑字段</a>
          <button class="btn danger" id="deleteBtn">删除</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    const id = qs('id');
    let form = null;
    const canvas = document.getElementById('qrCanvas');
    const ctx = canvas.getContext('2d');
    let qrImg = null; // base QR image

    function draw() {
      ctx.clearRect(0, 0, 512, 512);
      if (qrImg) ctx.drawImage(qrImg, 0, 0, 512, 512);
      if (form && form.logo && logoImg && logoImg.complete) {
        const size = 512 * 0.24;
        const pad = size * 0.16;
        const x = (512 - size) / 2, y = (512 - size) / 2;
        // white rounded background
        ctx.fillStyle = '#fff';
        const r = 14;
        const bx = x - pad, by = y - pad, bw = size + pad * 2, bh = size + pad * 2;
        ctx.beginPath();
        ctx.moveTo(bx + r, by);
        ctx.arcTo(bx + bw, by, bx + bw, by + bh, r);
        ctx.arcTo(bx + bw, by + bh, bx, by + bh, r);
        ctx.arcTo(bx, by + bh, bx, by, r);
        ctx.arcTo(bx, by, bx + bw, by, r);
        ctx.closePath();
        ctx.fill();
        ctx.drawImage(logoImg, x, y, size, size);
      }
      document.getElementById('download').href = canvas.toDataURL('image/png');
    }

    let logoImg = null;
    function setLogo(dataUrl) {
      form.logo = dataUrl || null;
      document.getElementById('removeLogo').style.display = dataUrl ? '' : 'none';
      if (dataUrl) {
        logoImg = new Image();
        logoImg.onload = draw;
        logoImg.src = dataUrl;
      } else { logoImg = null; draw(); }
    }

    // shrink an uploaded image to <=240px PNG data URL
    function fileToLogo(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const im = new Image();
          im.onload = () => {
            const max = 240;
            const scale = Math.min(1, max / Math.max(im.width, im.height));
            const w = Math.round(im.width * scale), h = Math.round(im.height * scale);
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(im, 0, 0, w, h);
            resolve(c.toDataURL('image/png'));
          };
          im.onerror = reject;
          im.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    (async () => {
      await renderNav('forms');
      if (!(await requireAuth())) return;
      const msg = document.getElementById('msg');
      if (!id) { showMsg(msg, '缺少表单 ID', 'err'); return; }
      try {
        form = await api('/api/forms/' + id);
      } catch (err) { showMsg(msg, err.message, 'err'); return; }

      document.getElementById('content').style.display = '';
      document.getElementById('title').textContent = form.title;
      document.getElementById('desc').textContent = form.description || '';
      document.getElementById('formUrl').value = form.formUrl;
      document.getElementById('openForm').href = form.formUrl;
      document.getElementById('subCount').textContent = form.submissionCount || 0;
      document.getElementById('fieldCount').textContent = (form.fields || []).length;
      document.getElementById('subLink').href = '/form-submissions.html?id=' + id;
      document.getElementById('editLink').href = '/form-builder.html?id=' + id;

      // load base QR then logo
      qrImg = new Image();
      qrImg.onload = () => { draw(); if (form.logo) setLogo(form.logo); };
      qrImg.src = '/api/forms/' + id + '/image';

      document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(form.formUrl);
        showMsg(msg, '已复制表单链接', 'ok');
      });
      document.getElementById('logoFile').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const dataUrl = await fileToLogo(file);
          await api('/api/forms/' + id, { method: 'PUT', body: JSON.stringify({ logo: dataUrl }) });
          setLogo(dataUrl);
          showMsg(msg, 'Logo 已保存', 'ok');
        } catch (err) { showMsg(msg, err.message || 'Logo 处理失败', 'err'); }
      });
      document.getElementById('removeLogo').addEventListener('click', async () => {
        await api('/api/forms/' + id, { method: 'PUT', body: JSON.stringify({ logo: null }) });
        setLogo(null);
        showMsg(msg, '已移除 Logo', 'ok');
      });
      document.getElementById('deleteBtn').addEventListener('click', async () => {
        if (!confirm('确定删除该表单？所有收集到的记录也会一并删除。')) return;
        await api('/api/forms/' + id, { method: 'DELETE' });
        location.href = '/forms.html';
      });
    })();
  </script>
</body>
</html>
