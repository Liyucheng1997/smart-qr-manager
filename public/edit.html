<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>编辑二维码 — Smart QR Manager</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="nav" id="nav"></header>

  <div class="container narrow">
    <a href="#" id="back" class="muted" style="font-size:14px">← 返回详情</a>
    <h1 class="page-title" style="margin-top:14px">编辑二维码</h1>
    <p class="page-sub">修改标题或跳转链接（二维码图案不变，已印刷的码依然有效）</p>

    <div class="card">
      <div class="msg" id="msg"></div>

      <label for="title">标题</label>
      <input id="title" />

      <label for="target">目标链接</label>
      <input id="target" />
      <p class="muted" style="font-size:12px; margin:6px 0 0">
        保存后，所有扫码将立即跳转到新链接。
      </p>

      <button class="btn block" id="saveBtn" style="margin-top:20px">保存修改</button>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    (async () => {
      await renderNav();
      if (!(await requireAuth())) return;
      const id = qs('id');
      const msg = document.getElementById('msg');
      document.getElementById('back').href = '/detail.html?id=' + id;
      if (!id) { showMsg(msg, '缺少二维码 ID', 'err'); return; }
      try {
        const q = await api('/api/qrcodes/' + id);
        document.getElementById('title').value = q.title;
        document.getElementById('target').value = q.target;
      } catch (err) { showMsg(msg, err.message, 'err'); return; }

      const btn = document.getElementById('saveBtn');
      btn.addEventListener('click', async () => {
        const title = document.getElementById('title').value.trim();
        const target = document.getElementById('target').value.trim();
        if (!title || !target) { showMsg(msg, '标题和链接都要填写', 'err'); return; }
        btn.disabled = true;
        try {
          await api('/api/qrcodes/' + id, {
            method: 'PUT',
            body: JSON.stringify({ title, target }),
          });
          showMsg(msg, '已保存，正在返回详情…', 'ok');
          setTimeout(() => (location.href = '/detail.html?id=' + id), 700);
        } catch (err) {
          showMsg(msg, err.message, 'err');
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
