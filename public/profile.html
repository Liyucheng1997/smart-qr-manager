<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的信息 — Smart QR Manager</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .vip-badge { display:inline-block; background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; font-weight:800; font-size:13px; padding:5px 12px; border-radius:999px; box-shadow:0 2px 8px rgba(217,119,6,.3); }
    .vip-since { color:var(--muted,#94a3b8); font-size:11px; margin-top:4px; }
  </style>
</head>
<body>
  <header class="nav" id="nav"></header>

  <div class="container">
    <h1 class="page-title">我的信息</h1>
    <p class="page-sub">账号信息与你的全部项目</p>
    <div class="msg" id="msg"></div>

    <div id="content" style="display:none">
      <!-- Account card -->
      <div class="card">
        <div class="row" style="gap:16px; align-items:center">
          <div id="avatar" style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#818cf8);color:#fff;display:grid;place-items:center;font-size:24px;font-weight:800;flex:0 0 auto"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:20px;font-weight:800" id="uName"></div>
            <div class="muted" id="uEmail"></div>
            <div class="muted" style="font-size:12px;margin-top:2px" id="uJoined"></div>
          </div>
          <div id="memberBox" style="flex:0 0 auto;text-align:right"></div>
        </div>
      </div>

      <!-- Stat summary -->
      <div class="grid grid-3" style="margin-top:16px">
        <div class="card"><div class="stat-num" id="sQr">0</div><div class="stat-label">二维码</div></div>
        <div class="card"><div class="stat-num" id="sScan">0</div><div class="stat-label">累计扫码</div></div>
        <div class="card"><div class="stat-num" id="sForm">0</div><div class="stat-label">表单 · 收集 <span id="sSub">0</span> 份</div></div>
      </div>

      <!-- QR projects -->
      <div class="row spread" style="margin-top:28px">
        <h2 style="margin:0;font-size:18px">我的二维码</h2>
        <a class="btn ghost sm" href="/create.html">+ 新建</a>
      </div>
      <div class="grid" id="qrList" style="margin-top:12px"></div>

      <!-- Form projects -->
      <div class="row spread" style="margin-top:28px">
        <h2 style="margin:0;font-size:18px">我的表单</h2>
        <a class="btn ghost sm" href="/form-builder.html">+ 新建</a>
      </div>
      <div class="grid" id="formList" style="margin-top:12px"></div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    const THEME_NAMES = { classic: '简约', business: '商务', elegant: '优雅', vibrant: '活力', nature: '自然', dark: '暗夜' };

    (async () => {
      await renderNav('profile');
      if (!(await requireAuth())) return;
      const msg = document.getElementById('msg');
      let p;
      try { p = await api('/api/profile'); }
      catch (err) { showMsg(msg, err.message, 'err'); return; }

      document.getElementById('content').style.display = '';
      document.getElementById('avatar').textContent = (p.user.name || '?').slice(0, 1).toUpperCase();
      document.getElementById('uName').textContent = p.user.name;
      document.getElementById('uEmail').textContent = p.user.email;
      document.getElementById('uJoined').textContent = '注册于 ' + fmtDate(p.user.createdAt);

      const memberBox = document.getElementById('memberBox');
      if (p.user.isPaid) {
        memberBox.innerHTML = `<span class="vip-badge">★ 永久会员</span>` +
          (p.user.paidAt ? `<div class="vip-since">${fmtDate(p.user.paidAt)} 开通</div>` : '');
      } else if (p.user.isMember) {
        memberBox.innerHTML = `<span class="vip-badge">★ 永久会员</span>`;
      } else {
        memberBox.innerHTML = `<a class="btn ghost sm" href="/upgrade.html">开通会员</a>`;
      }
      document.getElementById('sQr').textContent = p.stats.qrCount;
      document.getElementById('sScan').textContent = p.stats.totalScans;
      document.getElementById('sForm').textContent = p.stats.formCount;
      document.getElementById('sSub').textContent = p.stats.totalSubmissions;

      const qrList = document.getElementById('qrList');
      qrList.innerHTML = p.qrcodes.length ? p.qrcodes.map((q) => `
        <div class="qr-item">
          <img class="qr-thumb" src="/api/qrcodes/${q.id}/image" alt="QR" />
          <div style="flex:1;min-width:0">
            <h3>${escapeHtml(q.title)}</h3>
            <div class="url">→ ${escapeHtml(q.target)}</div>
            <div class="muted" style="font-size:12px;margin-top:4px">扫码 <strong>${q.scanCount}</strong> 次 · ${fmtDate(q.createdAt)}</div>
          </div>
          <div class="row">
            <a class="btn ghost sm" href="/detail.html?id=${q.id}">详情</a>
            <a class="btn ghost sm" href="/stats.html?id=${q.id}">统计</a>
          </div>
        </div>`).join('') : '<div class="card empty">还没有二维码</div>';

      const formList = document.getElementById('formList');
      formList.innerHTML = p.forms.length ? p.forms.map((f) => `
        <div class="qr-item">
          <img class="qr-thumb" src="/api/forms/${f.id}/image" alt="QR" />
          <div style="flex:1;min-width:0">
            <h3>${escapeHtml(f.title)} <span class="tag">${THEME_NAMES[f.theme] || f.theme}</span></h3>
            <div class="muted" style="font-size:12px;margin-top:4px">${f.fieldCount} 字段 · 收集 <strong>${f.submissionCount}</strong> 份 · ${fmtDate(f.createdAt)}</div>
          </div>
          <div class="row">
            <a class="btn ghost sm" href="/form-detail.html?id=${f.id}">二维码</a>
            <a class="btn ghost sm" href="/form-submissions.html?id=${f.id}">结果</a>
          </div>
        </div>`).join('') : '<div class="card empty">还没有表单</div>';
    })();
  </script>
</body>
</html>
