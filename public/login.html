<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — Smart QR Manager</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="nav" id="nav"></header>

  <div class="container narrow">
    <div class="card">
      <div class="row spread">
        <h1 class="page-title" id="formTitle">登录</h1>
        <a href="#" id="toggleMode" class="muted" style="font-size:14px">没有账号？注册 →</a>
      </div>

      <div class="msg" id="msg"></div>

      <div id="nameField" style="display:none">
        <label for="name">昵称（可选）</label>
        <input id="name" placeholder="你的名字" autocomplete="nickname" />
      </div>

      <label for="email">邮箱</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />

      <label for="password">密码</label>
      <input id="password" type="password" placeholder="至少 6 位" autocomplete="current-password" />

      <button class="btn block" id="submitBtn" style="margin-top:20px">登录</button>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    renderNav('login');
    let mode = 'login';
    const msg = document.getElementById('msg');
    const nameField = document.getElementById('nameField');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const toggle = document.getElementById('toggleMode');

    toggle.addEventListener('click', (e) => {
      e.preventDefault();
      mode = mode === 'login' ? 'register' : 'login';
      const isReg = mode === 'register';
      formTitle.textContent = isReg ? '注册' : '登录';
      submitBtn.textContent = isReg ? '创建账号' : '登录';
      nameField.style.display = isReg ? 'block' : 'none';
      toggle.textContent = isReg ? '已有账号？登录 →' : '没有账号？注册 →';
      msg.className = 'msg';
    });

    async function submit() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value.trim();
      submitBtn.disabled = true;
      try {
        const path = mode === 'register' ? '/api/auth/register' : '/api/auth/login';
        const body = mode === 'register' ? { name, email, password } : { email, password };
        await api(path, { method: 'POST', body: JSON.stringify(body) });
        location.href = '/dashboard.html';
      } catch (err) {
        showMsg(msg, err.message, 'err');
        submitBtn.disabled = false;
      }
    }
    submitBtn.addEventListener('click', submit);
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submit();
    });
  </script>
</body>
</html>
