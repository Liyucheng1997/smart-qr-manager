<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>收集结果 — Smart QR Manager</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="nav" id="nav"></header>

  <div class="container">
    <a href="#" id="back" class="muted" style="font-size:14px">← 返回表单二维码</a>
    <div class="row spread" style="margin-top:14px">
      <div>
        <h1 class="page-title" id="title">收集结果</h1>
        <p class="page-sub" id="sub">谁提交了，以及他们填写的信息</p>
      </div>
      <a class="btn ghost" id="exportBtn">导出 CSV</a>
    </div>

    <div class="msg" id="msg"></div>
    <div class="card table-wrap" id="tableCard" style="display:none">
      <table id="table"></table>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    (async () => {
      await renderNav('forms');
      if (!(await requireAuth())) return;
      const id = qs('id');
      const msg = document.getElementById('msg');
      document.getElementById('back').href = '/form-detail.html?id=' + id;
      document.getElementById('exportBtn').href = '#';
      if (!id) { showMsg(msg, '缺少表单 ID', 'err'); return; }

      let res;
      try { res = await api('/api/forms/' + id + '/submissions'); }
      catch (err) { showMsg(msg, err.message, 'err'); return; }

      const { form, submissions } = res;
      document.getElementById('title').textContent = '收集结果 · ' + form.title;
      document.getElementById('sub').textContent = `共 ${submissions.length} 份提交`;
      document.getElementById('exportBtn').addEventListener('click', () => {
        location.href = '/api/forms/' + id + '/export';
      });

      if (!submissions.length) {
        document.getElementById('tableCard').style.display = 'block';
        document.getElementById('table').innerHTML =
          '<tbody><tr><td class="muted">还没有人提交，分享二维码后这里会显示填写记录。</td></tr></tbody>';
        return;
      }

      const cell = (v) => Array.isArray(v) ? v.join('、') : (v || '');
      const head = '<thead><tr><th>#</th><th>提交时间</th>' +
        form.fields.map((f) => `<th class="wrap">${escapeHtml(f.label)}</th>`).join('') +
        '</tr></thead>';
      const body = '<tbody>' + submissions.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${fmtDate(s.at)}</td>
          ${form.fields.map((f) => `<td class="wrap">${escapeHtml(cell(s.data[f.id]))}</td>`).join('')}
        </tr>`).join('') + '</tbody>';
      document.getElementById('table').innerHTML = head + body;
      document.getElementById('tableCard').style.display = 'block';
    })();
  </script>
</body>
</html>
