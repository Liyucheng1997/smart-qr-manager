<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>控制台 — Smart QR Manager</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="nav" id="nav"></header>

  <div class="container">
    <div class="row spread">
      <div>
        <h1 class="page-title">控制台</h1>
        <p class="page-sub">管理你的所有二维码</p>
      </div>
      <a class="btn" href="/create.html">+ 创建二维码</a>
    </div>

    <div class="msg" id="msg"></div>
    <div class="grid" id="list"></div>
  </div>

  <script src="/app.js"></script>
  <script>
    (async () => {
      await renderNav('dashboard');
      const me = await requireAuth();
      if (!me) return;
      const list = document.getElementById('list');
      try {
        const items = await api('/api/qrcodes');
        if (!items.length) {
          list.innerHTML = `<div class="card empty">
            还没有二维码。<br/><br/>
            <a class="btn" href="/create.html">+ 创建第一个二维码</a>
          </div>`;
          return;
        }
        list.innerHTML = items.map((q) => `
          <div class="qr-item">
            <img class="qr-thumb" src="/api/qrcodes/${q.id}/image" alt="QR" />
            <div style="flex:1; min-width:0">
              <h3>${escapeHtml(q.title)}</h3>
              <div class="url">→ ${escapeHtml(q.target)}</div>
              <div class="muted" style="font-size:12px; margin-top:4px">
                扫码 <strong>${q.scanCount}</strong> 次 · 创建于 ${fmtDate(q.createdAt)}
              </div>
            </div>
            <div class="row">
              <a class="btn ghost sm" href="/detail.html?id=${q.id}">详情</a>
              <a class="btn ghost sm" href="/stats.html?id=${q.id}">统计</a>
              <a class="btn ghost sm" href="/edit.html?id=${q.id}">编辑</a>
            </div>
          </div>`).join('');
      } catch (err) {
        showMsg(document.getElementById('msg'), err.message, 'err');
      }
    })();
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
  </script>
</body>
</html>
